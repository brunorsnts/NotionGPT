spring.application.name=rag

spring.datasource.url= jdbc:postgresql://localhost:5433/notiongpt
spring.datasource.username=${DB_USER_PGVECTOR}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


chat.memory.max-messages=20
chat.memory.ttl=PT2H
chat.memory.max-sessions=500

anthropic-api-key=${ANTHROPIC_API_KEY}
cohere-api-key=${COHERE_API_KEY}
notion-api-key=${NOTION_API_KEY}
notion-data-source-id=${NOTION_DATA_SOURCE_ID}
