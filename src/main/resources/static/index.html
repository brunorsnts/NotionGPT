<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotionGPT — Biblioteca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-name">Notion<span>GPT</span></span>
      <span class="logo-tag">v0.1.0 · biblioteca pessoal</span>
    </div>
    <div class="header-right">
      <div class="stat-pill" id="stat-count">carregando...</div>
      <button class="stats-btn" onclick="toggleStats()" title="Observabilidade">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="9" width="3" height="6" rx="1" fill="currentColor" opacity="0.6"/>
          <rect x="6" y="5" width="3" height="10" rx="1" fill="currentColor" opacity="0.8"/>
          <rect x="11" y="1" width="3" height="14" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- STATS DRAWER -->
  <div class="stats-overlay" id="stats-overlay" onclick="closeStatsOutside(event)">
    <div class="stats-drawer" id="stats-drawer">
      <div class="stats-drawer-header">
        <div class="stats-drawer-title-group">
          <div class="stats-live-dot"></div>
          <span class="stats-drawer-title">Observabilidade</span>
        </div>
        <button class="stats-close-btn" onclick="toggleStats()" title="Fechar">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="stats-body" id="stats-body">
        <div class="stats-loading">Carregando métricas...</div>
      </div>
      <div class="stats-footer">
        <button class="stats-refresh-btn" onclick="loadStats()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M1.5 6.5a5 5 0 109.5-2M11 1v3.5H7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Atualizar
        </button>
      </div>
    </div>
  </div>

  <main>
    <div class="library-header">
      <div class="library-title">
        Acervo
        <em>seus resumos de estudo</em>
      </div>
      <div class="sync-info" id="sync-info"></div>
    </div>

    <div class="search-bar">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="4.5" stroke="#3d4d6b" stroke-width="1.5"/>
        <path d="M10 10l2.5 2.5" stroke="#3d4d6b" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" placeholder="Buscar por nome do documento..." id="search-input" oninput="filterDocs()">
    </div>

    <div class="doc-grid" id="doc-grid"></div>
  </main>

  <!-- CONFIRM DIALOG -->
  <div class="confirm-overlay" id="confirm-overlay" onclick="closeConfirmOutside(event)">
    <div class="confirm-dialog" id="confirm-dialog">
      <div class="confirm-title">Remover documento</div>
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="confirm-actions">
        <button class="btn-cancel" onclick="closeConfirm()">Cancelar</button>
        <button class="btn-danger" id="confirm-ok">Remover</button>
      </div>
    </div>
  </div>

  <!-- FLOATING CHAT -->
  <button class="chat-btn" onclick="toggleChat()" title="Abrir assistente">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M2 5a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2H8l-4 4V15H4a2 2 0 01-2-2V5z"
            fill="currentColor"/>
    </svg>
  </button>

  <div class="chat-panel" id="chat-panel">
    <div class="chat-resize-handle" id="chat-resize-handle">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M1 9L9 1M5 9L9 5M9 9L9 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="chat-header">
      <div class="chat-header-dot"></div>
      <span class="chat-header-title">NotionGPT</span>
      <span class="chat-header-sub">online</span>
      <div class="chat-header-actions">
        <button class="btn-history" id="btn-history" onclick="toggleHistory()" title="Histórico de sessões">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M6 3.5V6l1.5 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="btn-new-chat" onclick="newConversation()" title="Nova conversa">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- HISTORY PANEL (slides in over chat-messages) -->
    <div class="history-panel" id="history-panel">
      <div class="history-panel-header">
        <span class="history-panel-title">Sessões</span>
        <button class="history-close-btn" onclick="toggleHistory()" title="Fechar">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="msg ai">Olá! Pergunte-me qualquer coisa sobre seus resumos de estudo.</div>
    </div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" rows="1"
                placeholder="Faça uma pergunta..."
                onkeydown="handleKey(event)"></textarea>
      <button class="btn-send" id="btn-send" onclick="sendMessage()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
